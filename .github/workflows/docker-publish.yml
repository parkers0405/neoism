name: Publish daemon image

# Publishes the self-host daemon image to GHCR so `docker compose
# --profile server` (and plain `docker run`) users pull a prebuilt
# image instead of compiling the workspace from source. Runs on
# release tags and by hand.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/neoism-daemon
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The Dockerfile caps CARGO_BUILD_JOBS for developer machines;
          # CI runners are dedicated, but the release profile OOMs 16GB
          # runners with default settings (see build-stack.yml) — the
          # Dockerfile's plain `cargo build --release` for the daemon
          # alone stays within limits.
          cache-from: type=gha
          cache-to: type=gha,mode=max
