# Phosphor — green CRT terminal, the whole app behind curved glass.
# This file doubles as the pack template: every key under [pack] is
# optional, paths resolve relative to this directory, and a theme.toml
# next to this file is registered automatically.
[pack]
name = "Phosphor"
description = "Green phosphor CRT"
shader-overlay = "builtin:ctv_round"
# filters = ["/path/to/preset.slangp"]   # librashader chains (wgpu backend)
# font-family = "Px437 IBM VGA8"         # written into [fonts] on apply

[scrollbar]
thumb = "#29b356"
thumb-drag = "#45ff7d"

# Icon keys — semantic overrides a pack (or the user's [look.icons])
# can set. Each entry takes `glyph` (any string, e.g. a Nerd Font
# char) and/or `color` ("#RRGGBB"); unset fields keep the built-in.
#   [icons]
#   "folder" = { glyph = "", color = "#e5c07b" }
#
# File tree / tabs / breadcrumbs / finder / palette:
#   "folder"      — closed & open folder rows (glyph + color)
#   "file"        — the default/unknown-file-type icon (glyph + color)
#   "file.<ext>"  — per-extension, e.g. "file.rs", "file.md"; wins
#                   over the built-in file-type table (glyph + color)
#   "workspace"   — workspace root / Island tab icon (glyph + color)
# Buffer-tab strip:
#   "tab.terminal" — terminal tab icon (glyph + color)
#   "tab.new"      — the "+" new-tab button (glyph only)
# Status bar (glyph only — pill colors stay theme-driven):
#   "status.mode", "status.file", "status.terminal", "status.folder",
#   "status.branch", "status.lines", "status.lsp", "status.split",
#   "status.error", "status.warn"
# Notes sidebar:
#   "note" — default markdown-note icon (glyph only; per-note icons
#            from .neoism-icons.json still win)
# Command palette + splash menu (glyph only):
#   "palette.neoism", "palette.nvim", "palette.markdown",
#   "palette.notebook", "palette.draw", "palette.neoism-agent",
#   "palette.lsp", "palette.workspace"
# Git panel (glyph only; folder rows follow "folder"):
#   "git.branch", "git.close", "git.check",
#   "git.chevron-down", "git.chevron-right"
# Diagnostics/LSP popups share "status.error"/"status.warn"/
# "status.info"/"status.hint"/"status.lsp".
